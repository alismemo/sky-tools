<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Sky便利ツール</title><link rel="stylesheet" href="assets/style.css"></head><body><div class="wrap"><header><div><div class="title">Sky便利ツール 完成版</div><div class="sub" id="updated">読み込み中...</div></div><div class="actions"><button id="reload">再読み込み</button></div></header><main class="grid"><section class="card"><h2>🌟 デイリー</h2><div class="badge">対象エリア: <span id="dailyArea">...</span></div><ul id="dailyList"></ul></section><section class="card"><h2>🕯️ 日替わり大キャンドル</h2><div class="big" id="candleArea">...</div><ul id="candleList"></ul></section><section class="card"><h2>🌑 闇のかけら</h2><div class="big" id="shardPlace">...</div><ul id="shardList"></ul></section><section class="card dark"><h2>🍞 パン焼きタイマー</h2><div class="timer" id="bakeryTimer">--:--</div><div id="bakeryMemo" class="sub"></div></section></main><section class="card manual"><h2>手動補正</h2><p>9bitの表示形式が変わった時や、情報が違う時だけここに入力してください。OBSにも反映されます。</p><label>デイリー（1行ずつ）</label><textarea id="manualDaily" rows="4"></textarea><label>大キャンドル エリア</label><input id="manualCandleArea"><label>大キャンドル 場所（1行ずつ）</label><textarea id="manualCandlePlaces" rows="4"></textarea><label>闇のかけら 場所</label><input id="manualShardPlace"><label>闇のかけら メモ（1行ずつ）</label><textarea id="manualShardNotes" rows="4"></textarea><div class="actions"><button id="saveManual">保存</button><button id="clearManual">手動補正を削除</button></div></section><p class="source">参照: 9bit Sky攻略。GitHub Actionsで data/sky.json を自動更新します。</p></div><script src="assets/app.js"></script></body></html>
