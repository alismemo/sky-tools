<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Sky OBS</title><style>body{margin:0;background:transparent;color:white;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;padding:10px}.box{width:360px;background:rgba(11,15,34,.72);border:1px solid rgba(255,255,255,.18);border-radius:18px;padding:12px;backdrop-filter:blur(8px);box-shadow:0 10px 30px #0008}.h{font-weight:900;font-size:18px;margin-bottom:6px}.sec{margin-top:10px}.t{font-weight:800;color:#bfe9ff}.item{font-size:14px;line-height:1.45;background:rgba(255,255,255,.10);border-radius:10px;padding:6px;margin:5px 0}.timer{font-size:30px;font-weight:900;color:#fff3b0}.meta{font-size:11px;color:#cbd3ff;margin-top:8px}</style></head><body><div class="box"><div class="h">🪽 Sky Today</div><div class="sec"><div class="t">✅ デイリー</div><div id="daily"></div></div><div class="sec"><div class="t">🕯️ 大キャンドル</div><div id="candles"></div></div><div class="sec"><div class="t">🌑 闇のかけら</div><div id="shards"></div></div><div class="sec"><div class="t">🍞 次のパン焼き目安</div><div class="timer" id="breadTimer">--:--</div></div><div class="meta" id="meta"></div></div><script>const DATA_URL='../data/sky.json';let current={};function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}function arr(v){return Array.isArray(v)?v:String(v||'').split('\n').filter(Boolean)}function set(id,v){document.getElementById(id).innerHTML=arr(v).slice(0,5).map(x=>`<div class=item>${esc(x)}</div>`).join('')}async function load(){try{let manual=localStorage.getItem('skyManualData');if(manual){current=JSON.parse(manual)}else{let r=await fetch(DATA_URL+'?t='+Date.now());current=await r.json();localStorage.setItem('skyAutoData',JSON.stringify(current))}}catch(e){current=JSON.parse(localStorage.getItem('skyAutoData')||'{}')}set('daily',current.daily||['未取得']);set('candles',current.candles||['未取得']);set('shards',current.shards||['未取得']);meta.textContent='更新：'+(current.updatedAt||'不明')}function bread(){let n=new Date(),x=new Date(n),m=n.getMinutes();if(m<30)x.setMinutes(30,0,0);else x.setHours(n.getHours()+1,0,0,0);let d=Math.max(0,x-n);breadTimer.textContent=String(Math.floor(d/60000)).padStart(2,'0')+':'+String(Math.floor(d/1000)%60).padStart(2,'0')}load();bread();setInterval(load,300000);setInterval(bread,1000)</script></body></html>
