<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Sky OBS</title><link rel="stylesheet" href="css/style.css"><style>body{background:transparent}.wrap{width:100vw;grid-template-columns:1fr;gap:10px;padding:10px}.card{background:rgba(11,16,38,.72);backdrop-filter:blur(8px);padding:12px;border-radius:14px}header,.controls{display:none}.card h2{font-size:18px}.list{font-size:14px;line-height:1.55}.timer{font-size:24px}.full{display:none}</style></head><body><main class="wrap"><section class="card"><h2>🌟 デイリー</h2><div id="dailyMeta"></div><ol id="dailyList" class="list"></ol></section><section class="card"><h2>🕯️ 大キャンドル</h2><div id="candlesMeta"></div><ol id="candlesList" class="list"></ol></section><section class="card"><h2>🌑 闇のかけら</h2><div id="shardsMeta"></div><ol id="shardsList" class="list"></ol></section><section class="card"><h2>🍞 パン <span id="breadNext">--:--</span></h2><div id="breadCount" class="timer">--:--:--</div></section><section class="card"><h2>🌋 ゲイザー <span id="geyserNext">--:--</span></h2><div id="geyserCount" class="timer">--:--:--</div></section><section class="card"><h2>🐢 タートル <span id="turtleNext">--:--</span></h2><div id="turtleCount" class="timer">--:--:--</div></section><div id="updated" class="small"></div></main><script src="js/app.js"></script></body></html>
