<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Sky OBS</title><style>body{margin:0;background:transparent;color:#fff;font-family:system-ui,'Yu Gothic',sans-serif}.box{width:360px;background:rgba(12,18,38,.72);border:1px solid rgba(255,255,255,.25);border-radius:16px;padding:14px;text-shadow:0 2px 6px #000}.h{font-weight:900;font-size:18px;margin-bottom:6px}.sec{margin-top:10px}.t{font-size:24px;font-weight:900}ul{margin:4px 0 0 18px;padding:0}li{margin:3px 0;font-size:13px}.small{font-size:12px;opacity:.85}</style></head><body><div class="box"><div class="h">Sky便利ツール</div><div id="upd" class="small">読み込み中</div><div class="sec">🌟 <b>デイリー</b><div id="area" class="small"></div><ul id="daily"></ul></div><div class="sec">🕯️ <b>大キャン</b><div id="candles" class="small"></div></div><div class="sec">🌑 <b>闇のかけら</b><div id="shards" class="small"></div></div><div class="sec">🍞 次のパン焼き <div id="bread" class="t">--:--</div><div id="remain" class="small"></div></div></div><script>let D=null;const $=id=>document.getElementById(id);async function load(){const r=await fetch('./data/sky.json?ts='+Date.now());D=await r.json();$('upd').textContent='更新 '+(D.updatedAtJst||'未取得');$('area').textContent=D.daily?.area||'';$('daily').innerHTML=(D.daily?.quests||[]).slice(0,4).map(x=>'<li>'+x+'</li>').join('');$('candles').textContent=(D.bigCandles?.area||'未取得')+' / '+(D.bigCandles?.locations||[]).slice(0,2).join('、');$('shards').textContent=(D.shards?.location||'未取得')+' '+(D.shards?.type||'')+' '+(D.shards?.times||[]).join(' / ')}function next(times){const now=new Date();let b=null;(times||[]).forEach(t=>{const [h,m]=t.split(':').map(Number);const d=new Date();d.setHours(h,m,0,0);if(d<=now)d.setDate(d.getDate()+1);if(!b||d<b)b=d});return b}function tick(){if(!D)return;const n=next(D.timers?.bread);if(!n)return;const diff=n-new Date();const mm=Math.floor(diff/60000),ss=Math.floor((diff%60000)/1000);$('bread').textContent=n.toTimeString().slice(0,5);$('remain').textContent=`あと ${Math.floor(mm/60)}時間${mm%60}分${String(ss).padStart(2,'0')}秒`;}load();setInterval(load,300000);setInterval(tick,1000);</script></body></html>
